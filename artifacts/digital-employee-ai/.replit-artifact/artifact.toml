kind = "web"
previewPath = "/"
title = "Digital Employee AI"
version = "1.0.0"
id = "artifacts/digital-employee-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24722

[services.development]
run = "pnpm --filter @workspace/digital-employee-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-employee-ai", "run", "build" ]
publicDir = "artifacts/digital-employee-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24722"
BASE_PATH = "/"
